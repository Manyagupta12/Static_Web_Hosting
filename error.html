<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:#fff;
    }

    .container{
      text-align:center;
      padding:40px;
      max-width:600px;
    }

    h1{
      font-size:120px;
      color:#38bdf8;
      margin-bottom:10px;
    }

    h2{
      font-size:32px;
      margin-bottom:15px;
    }

    p{
      font-size:18px;
      color:#cbd5e1;
      line-height:1.6;
      margin-bottom:30px;
    }

    a{
      display:inline-block;
      padding:14px 30px;
      background:#38bdf8;
      color:#fff;
      text-decoration:none;
      border-radius:8px;
      font-size:18px;
      transition:.3s;
    }

    a:hover{
      background:#0ea5e9;
      transform:translateY(-3px);
    }

    @media(max-width:600px){
      h1{
        font-size:80px;
      }

      h2{
        font-size:24px;
      }

      p{
        font-size:16px;
      }
    }
  </style>
</head>
<body>

<div class="container">
    <h1>404</h1>
    <h2>Oops! Page Not Found</h2>

    <p>
        The page you're looking for doesn't exist, may have been moved,
        or the URL is incorrect.
    </p>

    <a href="index.html">← Back to Home</a>
</div>

</body>
</html>
